<svg xmlns="http://www.w3.org/2000/svg" width="520" height="360" viewBox="0 0 520 360" font-family="Segoe UI, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15171c"/>
      <stop offset="1" stop-color="#0d0e12"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.5"/>
    </filter>
  </defs>

  <rect width="520" height="360" fill="url(#desk)"/>

  <!-- faint editor + left chrome, to read the HUD as an overlay -->
  <g opacity="0.32">
    <rect x="20" y="26" width="250" height="250" rx="10" fill="#0c0d10" stroke="#262a31"/>
    <rect x="42" y="60"  width="150" height="7" rx="3.5" fill="#3a3f49"/>
    <rect x="42" y="80"  width="196" height="7" rx="3.5" fill="#2c303a"/>
    <rect x="42" y="100" width="110" height="7" rx="3.5" fill="#2c303a"/>
    <rect x="42" y="128" width="170" height="7" rx="3.5" fill="#3a3f49"/>
    <rect x="42" y="148" width="80"  height="7" rx="3.5" fill="#2c303a"/>
    <rect x="42" y="182" width="150" height="7" rx="3.5" fill="#2c303a"/>
    <rect x="42" y="202" width="104" height="7" rx="3.5" fill="#3a3f49"/>
    <circle cx="34" cy="300" r="11" fill="#1a1c21"/><path d="M31 296v6a3 3 0 006 0v-6a3 3 0 00-6 0z" fill="#6b7280"/>
    <rect x="16" y="322" width="34" height="30" rx="7" fill="#3a2018"/><path d="M33 344v-14 M27 336l6-6 6 6" stroke="#ff7a2f" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- new-window (starburst) button, rides above the tab stack -->
  <g>
    <rect x="430" y="44" width="70" height="70" rx="16" fill="#ff7a2f" opacity="0.28" filter="url(#glow)"/>
    <rect x="432" y="46" width="66" height="66" rx="15" fill="#1a1e26" stroke="#ff7a2f" stroke-width="1.6"/>
    <g stroke="#ff7a2f" stroke-width="2" stroke-linecap="round">
      <g transform="translate(465,79)">
        <line x1="0" y1="-16" x2="0" y2="-7"/><line x1="0" y1="16" x2="0" y2="7"/>
        <line x1="-16" y1="0" x2="-7" y2="0"/><line x1="16" y1="0" x2="7" y2="0"/>
        <line x1="-11.3" y1="-11.3" x2="-5" y2="-5"/><line x1="11.3" y1="11.3" x2="5" y2="5"/>
        <line x1="-11.3" y1="11.3" x2="-5" y2="5"/><line x1="11.3" y1="-11.3" x2="5" y2="-5"/>
        <line x1="-6.1" y1="-14.8" x2="-2.7" y2="-6.5"/><line x1="6.1" y1="14.8" x2="2.7" y2="6.5"/>
        <line x1="14.8" y1="-6.1" x2="6.5" y2="-2.7"/><line x1="-14.8" y1="6.1" x2="-6.5" y2="2.7"/>
      </g>
    </g>
  </g>

  <!-- tab stack, bottom-right. one chip per session, in that session's color -->
  <!-- Servos Impulse Board — done (purple) -->
  <g>
    <rect x="272" y="150" width="230" height="44" rx="11" fill="none" stroke="#c62dff" stroke-width="3" opacity="0.85" filter="url(#glow)"/>
    <rect x="272" y="150" width="230" height="44" rx="11" fill="#141319" stroke="#c62dff" stroke-width="1.6"/>
    <path d="M289 172 l5 5 9 -11" fill="none" stroke="#c62dff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="315" y="177" fill="#d98cff" font-size="14.5" font-weight="700">Servos Impulse Board</text>
  </g>

  <!-- Landing Animation — working (yellow) -->
  <g>
    <rect x="272" y="206" width="230" height="44" rx="11" fill="none" stroke="#ffd21a" stroke-width="3" opacity="0.85" filter="url(#glow)"/>
    <rect x="272" y="206" width="230" height="44" rx="11" fill="#141319" stroke="#ffd21a" stroke-width="1.6"/>
    <circle cx="296" cy="228" r="6.5" fill="#ffd21a"/>
    <text x="315" y="233" fill="#ffde5c" font-size="14.5" font-weight="700">Landing Animation</text>
  </g>

  <!-- Session HUD — done (cyan) -->
  <g>
    <rect x="272" y="262" width="230" height="44" rx="11" fill="none" stroke="#17c3ff" stroke-width="3" opacity="0.85" filter="url(#glow)"/>
    <rect x="272" y="262" width="230" height="44" rx="11" fill="#141319" stroke="#17c3ff" stroke-width="1.6"/>
    <path d="M289 284 l5 5 9 -11" fill="none" stroke="#17c3ff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="315" y="289" fill="#7fe0ff" font-size="14.5" font-weight="700">Session HUD</text>
  </g>
</svg>
